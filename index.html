<!doctype html>
<html
  lang="en"
  class="dark"
>
  <head>
    <meta charset="UTF-8" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon-16x16.png"
    />
    <meta
      name="theme-color"
      content="#252525"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta
      name="description"
      content="HorizonX - The ultimate all-in-one infrastructure monitoring and deployment platform. Real-time telemetry, GitOps deployments, and fleet management powered by Go."
    />

    <meta
      property="og:type"
      content="website"
    />
    <meta
      property="og:url"
      content="https://horizonx.app/"
    />
    <meta
      property="og:title"
      content="HorizonX | Infrastructure Monitoring & Deployment"
    />

      property="og:description"
      content="The command center for your infrastructure. Real-time server health and seamless GitOps deployments in one unified dashboard."

      property="og:image"
      content="/logo.png"
    />

    <!-- Twitter -->
    <meta
      property="twitter:card"
      content="summary_large_image"
    />
    <meta
      property="twitter:title"
      content="HorizonX | Infrastructure Monitoring & Deployment"
    />
    <meta
      property="twitter:description"
      content="The command center for your infrastructure. Real-time server health and seamless GitOps deployments in one unified dashboard."
    />
    <meta
      property="twitter:image"
      content="/logo.png"
    />

    <title>HorizonX</title>
